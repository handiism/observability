name: Deploy SigNoz

on:
  push:
    branches: [main]
    paths: ['ansible/**']
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "production"
        type: choice
        options:
          - production

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: pip install ansible

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Configure Ansible Variables
        run: |
          mkdir -p ansible/group_vars
          cat > ansible/group_vars/all.yml << 'ENDOFFILE'
          ---
          signoz_domain: "${{ secrets.SIGNOZ_DOMAIN }}"
          vps_timezone: "Asia/Jakarta"
          ops_user: "ops"
          ops_ssh_pubkey: "${{ secrets.OPS_SSH_PUBKEY }}"
          letsencrypt_email: "${{ secrets.LETSENCRYPT_EMAIL }}"
          signoz_grpc_port: 4317
          signoz_http_port: 4318
          postgres_version: "16"
          postgres_db: "signoz"
          postgres_user: "signoz"
          postgres_password: "${{ secrets.POSTGRES_PASSWORD }}"
          traefik_version: "v3.0"
          uptime_kuma_version: "2.4.0"
          uptime_kuma_domain: "${{ secrets.UPTIME_KUMA_DOMAIN }}"
          uptime_kuma_port: 3001
          retention_logs_days: 15
          retention_traces_days: 15
          retention_metrics_days: 30
          ENDOFFILE

      - name: Configure Inventory
        run: |
          cat > ansible/inventory/production.yml << 'ENDOFFILE'
          ---
          all:
            hosts:
              signoz-vps:
                ansible_host: "${{ secrets.VPS_HOST }}"
                ansible_user: root
                ansible_python_interpreter: /usr/bin/python3
            vars:
              ansible_ssh_private_key_file: "~/.ssh/id_ed25519"
              ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
          ENDOFFILE

      - name: Run Ansible Playbook
        run: |
          cd ansible
          ansible-playbook -i inventory/production.yml site.yml -v
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"

      - name: Verify Deployment
        run: |
          ssh -o StrictHostKeyChecking=no ops@${{ secrets.VPS_HOST }} "docker ps --format 'table {{.Names}}\t{{.Status}}'"
