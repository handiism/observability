---
# ============================================
# VPS Configuration
# ============================================
# For local: fill values directly
# For CI/CD: these will be overridden by environment variables
signoz_domain: "{{ lookup('env', 'SIGNOZ_DOMAIN') | default('signoz.example.com', true) }}"
vps_timezone: "{{ lookup('env', 'VPS_TIMEZONE') | default('Asia/Jakarta', true) }}"

# ============================================
# SSH & User Configuration
# ============================================
ops_user: "ops"
ops_ssh_pubkey: "{{ lookup('env', 'OPS_SSH_PUBKEY') | default('ssh-ed25519 CHANGE_ME_YOUR_PUBLIC_KEY', true) }}"

# ============================================
# SSL/Let's Encrypt Configuration
# ============================================
letsencrypt_email: "{{ lookup('env', 'LETSENCRYPT_EMAIL') | default('admin@' + signoz_domain, true) }}"

# ============================================
# SigNoz Configuration (Foundry manages versions)
# ============================================
signoz_grpc_port: 4317
signoz_http_port: 4318

# ============================================
# PostgreSQL Configuration
# ============================================
postgres_version: "16"
postgres_db: "signoz"
postgres_user: "signoz"
postgres_password: "{{ lookup('env', 'POSTGRES_PASSWORD') | default(omit, true) }}"

# ============================================
# Traefik Configuration
# ============================================
traefik_version: "v3.7.7"

# ============================================
# Uptime Kuma Configuration
# ============================================
uptime_kuma_version: "2.4.0"
uptime_kuma_domain: "{{ lookup('env', 'UPTIME_KUMA_DOMAIN') | default('uptime.' + signoz_domain, true) }}"
uptime_kuma_port: 3001

# ============================================
# Retention Configuration (days)
# ============================================
retention_logs_days: 15
retention_traces_days: 15
retention_metrics_days: 30
