---
# ============================================
# Install Foundry
# ============================================
- name: Check if Foundry is installed
  stat:
    path: "/home/{{ ops_user }}/.local/bin/foundryctl"
  register: foundry_check

- name: Install Foundry
  shell: curl -fsSL https://signoz.io/foundry.sh | bash
  args:
    creates: "/home/{{ ops_user }}/.local/bin/foundryctl"
  when: not foundry_check.stat.exists

- name: Add Foundry to PATH
  lineinfile:
    path: "/home/{{ ops_user }}/.bashrc"
    line: 'export PATH="/home/{{ ops_user }}/.local/bin:$PATH"'
    state: present

# ============================================
# Install Python YAML library
# ============================================
- name: Install PyYAML
  apt:
    name: python3-yaml
    state: present

# ============================================
# Create directories for SigNoz
# ============================================
- name: Create SigNoz directory structure
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ops_user }}"
    group: "{{ ops_user }}"
    mode: "0755"
  loop:
    - /opt/signoz
    - /opt/signoz/configs

# ============================================
# Deploy Foundry casting.yaml
# ============================================
- name: Deploy casting.yaml
  template:
    src: casting.yaml.j2
    dest: /opt/signoz/casting.yaml
    owner: "{{ ops_user }}"
    group: "{{ ops_user }}"
    mode: "0644"

# ============================================
# Generate docker-compose with Foundry
# ============================================
- name: Generate docker-compose with Foundry
  command: /home/{{ ops_user }}/.local/bin/foundryctl forge -f casting.yaml
  args:
    chdir: /opt/signoz
  become: true
  become_user: "{{ ops_user }}"

# ============================================
# Deploy additional services (Traefik + Uptime Kuma)
# ============================================
- name: Deploy additional services
  template:
    src: additional-services.yml.j2
    dest: /opt/signoz/pours/deployment/additional-services.yml
    owner: "{{ ops_user }}"
    group: "{{ ops_user }}"
    mode: "0644"

# ============================================
# Merge compose files using Python
# ============================================
- name: Merge docker-compose files
  shell: |
    python3 -c "
    import yaml
    import sys

    with open('compose.yaml', 'r') as f:
        main = yaml.safe_load(f)

    with open('additional-services.yml', 'r') as f:
        additional = yaml.safe_load(f)

    if 'services' in additional:
        main.setdefault('services', {}).update(additional['services'])
    if 'volumes' in additional:
        main.setdefault('volumes', {}).update(additional['volumes'])
    if 'networks' in additional:
        main.setdefault('networks', {}).update(additional['networks'])

    with open('compose.yaml', 'w') as f:
        yaml.dump(main, f, default_flow_style=False, sort_keys=False)
    "
  args:
    chdir: /opt/signoz/pours/deployment
  become: true
  become_user: "{{ ops_user }}"

# ============================================
# Add Traefik labels to SigNoz service
# ============================================
- name: Add Traefik labels to SigNoz service
  shell: |
    python3 -c "
    import yaml

    with open('compose.yaml', 'r') as f:
        compose = yaml.safe_load(f)

    if 'services' in compose and 'signoz-signoz-0' in compose['services']:
        compose['services']['signoz-signoz-0']['labels'] = {
            'traefik.enable': 'true',
            'traefik.http.routers.signoz.rule': 'Host(\`{{ signoz_domain }}\`)',
            'traefik.http.routers.signoz.entrypoints': 'websecure',
            'traefik.http.routers.signoz.tls.certresolver': 'letsencrypt',
            'traefik.http.services.signoz.loadbalancer.server.port': '8080'
        }

    with open('compose.yaml', 'w') as f:
        yaml.dump(compose, f, default_flow_style=False, sort_keys=False)
    "
  args:
    chdir: /opt/signoz/pours/deployment
  become: true
  become_user: "{{ ops_user }}"

# ============================================
# Start SigNoz Stack
# ============================================
- name: Start SigNoz stack
  command: docker compose up -d
  args:
    chdir: /opt/signoz/pours/deployment
  become: true
  become_user: "{{ ops_user }}"

- name: Wait for ClickHouse to be ready
  command: docker compose exec -T signoz-telemetrystore-clickhouse-0-0 clickhouse-client --query "SELECT 1"
  args:
    chdir: /opt/signoz/pours/deployment
  become: true
  become_user: "{{ ops_user }}"
  register: clickhouse_check
  retries: 30
  delay: 10
  until: clickhouse_check.rc == 0

- name: Wait for SigNoz UI to be ready
  command: docker compose exec -T signoz-signoz-0 wget --spider -q http://localhost:8080/api/v1/health
  args:
    chdir: /opt/signoz/pours/deployment
  become: true
  become_user: "{{ ops_user }}"
  register: signoz_check
  retries: 30
  delay: 10
  until: signoz_check.rc == 0

- name: Wait for Uptime Kuma to be ready
  command: docker compose ps uptime-kuma
  args:
    chdir: /opt/signoz/pours/deployment
  become: true
  become_user: "{{ ops_user }}"
  register: uptime_check
  retries: 30
  delay: 10
  until: "'Up' in uptime_check.stdout"
