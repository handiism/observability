services:
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://REDACTED_VPS_IP:4317}
      - OTEL_SERVICE_NAME=api-gateway
      - BACKEND_SERVICE_URL=http://backend-service:8081
    networks:
      - sample-network

  backend-service:
    build: ./backend-service
    container_name: backend-service
    ports:
      - "8081:8081"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://REDACTED_VPS_IP:4317}
      - OTEL_SERVICE_NAME=backend-service
    networks:
      - sample-network

networks:
  sample-network:
    driver: bridge
